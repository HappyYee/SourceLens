<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>源镜 SourceLens · v0 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3f0e9;
    --paper-2:#eceae1;
    --card:#fbfaf6;
    --ink:#1b1a17;
    --ink-2:#54514a;
    --ink-3:#8b877d;
    --line:#dcd7cb;
    --line-2:#e7e3d9;
    --accent:#14564a;
    --accent-soft:#e0ebe6;
    --serif:'Newsreader',"Songti SC",ui-serif,Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--cjk);
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(27,26,23,.035) 1px, transparent 0);
    background-size:4px 4px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#fff}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:286px;flex:0 0 286px;
    background:var(--paper-2);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  .brand{padding:22px 22px 16px;border-bottom:1px solid var(--line)}
  .brand-row{display:flex;align-items:baseline;gap:9px}
  .brand-cn{font-family:var(--serif);font-weight:600;font-size:23px;letter-spacing:.5px}
  .brand-en{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-3)}
  .brand-tag{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:7px;letter-spacing:.2px}
  .today-line{
    padding:13px 22px;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:11.5px;color:var(--ink-2);
    display:flex;justify-content:space-between;align-items:center;
  }
  .today-line .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px;vertical-align:middle}

  .nav{flex:1;overflow-y:auto;padding:10px 12px 16px}
  .nav::-webkit-scrollbar{width:8px}
  .nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  .home-btn{
    width:100%;text-align:left;border:1px solid transparent;background:transparent;cursor:pointer;
    font-family:var(--cjk);font-size:13px;color:var(--ink);
    padding:8px 10px;border-radius:8px;display:flex;align-items:center;gap:9px;margin-bottom:6px;
  }
  .home-btn:hover{background:var(--card)}
  .home-btn.active{background:var(--ink);color:var(--paper)}
  .home-btn svg{width:15px;height:15px;flex:0 0 15px}

  .section{margin-top:8px}
  .section-head{
    display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
    padding:7px 8px 6px;border-radius:6px;
  }
  .section-head:hover{background:var(--card)}
  .section-head .chev{width:12px;height:12px;color:var(--ink-3);transition:transform .15s ease;flex:0 0 12px}
  .section.collapsed .chev{transform:rotate(-90deg)}
  .section-head .label{font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3)}
  .section-head .count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-3)}
  .section-body{overflow:hidden;transition:max-height .2s ease}
  .section.collapsed .section-body{max-height:0!important}

  .room-link{
    width:100%;text-align:left;border:none;background:transparent;cursor:pointer;
    font-family:var(--cjk);font-size:13px;color:var(--ink-2);
    padding:6px 8px 6px 14px;border-radius:7px;display:flex;align-items:center;gap:8px;
  }
  .room-link:hover{background:var(--card);color:var(--ink)}
  .room-link.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
  .room-link .imp{display:flex;gap:1.5px;margin-left:auto;flex:0 0 auto}
  .room-link .imp i{width:4px;height:11px;border-radius:1px;background:var(--line);display:block}
  .room-link .imp i.on{background:var(--ink-3)}
  .room-link.active .imp i.on{background:var(--accent)}
  .room-link .upd{font-family:var(--mono);font-size:9.5px;color:#fff;background:var(--accent);border-radius:20px;padding:1px 6px;margin-left:auto}
  .room-link .imp + .upd{margin-left:7px}
  .sub .room-link{padding-left:28px;font-size:12.5px}
  .sub .room-link .platdot{width:5px;height:5px;border-radius:50%;background:var(--ink-3);opacity:.5}
  .child-toggle{cursor:pointer}
  .child-toggle .chev2{width:11px;height:11px;color:var(--ink-3);transition:transform .15s ease;margin-right:-2px}
  .child-wrap.collapsed .child-rooms{display:none}
  .child-wrap.collapsed .chev2{transform:rotate(-90deg)}

  .new-btn{
    margin:8px 12px 14px;padding:9px;border:1px dashed var(--line);border-radius:9px;
    background:transparent;cursor:pointer;color:var(--ink-3);font-family:var(--cjk);font-size:12.5px;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .new-btn:hover{border-color:var(--ink-3);color:var(--ink-2)}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    height:60px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;padding:0 30px;gap:16px;
    position:sticky;top:0;background:var(--paper);z-index:5;backdrop-filter:saturate(1.1);
  }
  .crumb{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:8px}
  .crumb .back{cursor:pointer;color:var(--ink-2);border:1px solid var(--line);border-radius:7px;padding:5px 10px;background:var(--card)}
  .crumb .back:hover{border-color:var(--ink-3)}
  .topbar .spacer{flex:1}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{border:none;background:transparent;cursor:pointer;font-family:var(--mono);font-size:11px;padding:7px 13px;color:var(--ink-3)}
  .seg button.on{background:var(--ink);color:var(--paper)}

  .content{padding:30px 36px 64px;max-width:1180px}

  /* home */
  .h-head{display:flex;align-items:baseline;gap:14px;margin-bottom:5px}
  .h-title{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:.3px}
  .h-sub{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
  .h-note{font-size:13px;color:var(--ink-2);margin-bottom:24px;max-width:640px}
  .h-note b{color:var(--ink);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;grid-auto-flow:dense}
  .tile{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 17px 15px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;
    display:flex;flex-direction:column;min-height:150px;position:relative;
  }
  .tile:hover{transform:translateY(-2px);box-shadow:0 8px 22px -14px rgba(27,26,23,.4);border-color:#cfcabd}
  .tile.feature{grid-column:span 2;min-height:316px}
  .tile-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
  .tile-name{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.2}
  .tile.feature .tile-name{font-size:23px}
  .tile-type{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;color:var(--ink-3);border:1px solid var(--line);border-radius:5px;padding:2px 6px;text-transform:uppercase;white-space:nowrap}
  .tile-meta{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .plats{display:flex;gap:7px;align-items:center}
  .plats svg{width:14px;height:14px;color:var(--ink-2)}
  .imp-row{display:flex;gap:2px;margin-left:auto}
  .imp-row i{width:5px;height:13px;border-radius:1px;background:var(--line)}
  .imp-row i.on{background:var(--ink)}
  .tile-upd{font-family:var(--mono);font-size:10.5px;color:var(--accent)}
  .peek{border-top:1px dashed var(--line-2);padding-top:11px;margin-top:auto;display:flex;flex-direction:column;gap:9px}
  .peek-item{display:flex;gap:9px;align-items:flex-start}
  .peek-item .pi-ic{margin-top:1px;flex:0 0 13px}
  .peek-item .pi-ic svg{width:13px;height:13px;color:var(--ink-3)}
  .peek-item .pi-t{font-size:12.5px;color:var(--ink-2);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .peek-item .pi-time{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);margin-left:auto;white-space:nowrap;flex:0 0 auto}
  .enter-hint{position:absolute;top:15px;right:15px;color:var(--ink-3);opacity:0;transition:opacity .14s}
  .tile:hover .enter-hint{opacity:1}
  .enter-hint svg{width:15px;height:15px}

  /* room view */
  .room-hero{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-bottom:8px;display:flex;align-items:flex-start;gap:22px;flex-wrap:wrap}
  .rh-left{flex:1;min-width:220px}
  .rh-name{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:.3px;line-height:1.1}
  .rh-sub{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
  .rh-type{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .bindings{display:flex;gap:8px;align-items:center}
  .binding{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:4px 9px;font-family:var(--mono);font-size:10.5px;color:var(--ink-2)}
  .binding svg{width:13px;height:13px;color:var(--ink)}
  .rh-right{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .imp-ctl{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
  .imp-ctl .squares{display:flex;gap:3px;cursor:pointer}
  .imp-ctl .squares i{width:8px;height:18px;border-radius:2px;background:var(--line);transition:background .1s}
  .imp-ctl .squares i.on{background:var(--accent)}
  .rh-hint{font-size:11.5px;color:var(--ink-3);max-width:230px;text-align:right;line-height:1.45}

  .timeline{margin-top:26px}
  .day-div{display:flex;align-items:center;gap:14px;margin:26px 0 16px}
  .day-div:first-child{margin-top:8px}
  .day-label{font-family:var(--mono);font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-2);white-space:nowrap}
  .day-div .ln{flex:1;height:1px;background:var(--line)}

  .item{display:flex;gap:16px;padding:15px 0;border-bottom:1px solid var(--line-2)}
  .item:hover .it-link{color:var(--accent)}
  .thumb{flex:0 0 168px;height:96px;border-radius:9px;position:relative;overflow:hidden;border:1px solid var(--line)}
  .thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .thumb .play svg{width:34px;height:34px;color:rgba(255,255,255,.92);filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))}
  .thumb .dur{position:absolute;right:7px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;background:rgba(0,0,0,.72);border-radius:4px;padding:1px 5px}
  .sq{flex:0 0 56px;height:56px;border-radius:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .sq svg{width:22px;height:22px;color:#fff;opacity:.9}
  .it-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .it-meta{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .it-meta .src{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
  .it-meta .src svg{width:13px;height:13px;color:var(--ink-2)}
  .ai-pill{font-family:var(--mono);font-size:9px;letter-spacing:.4px;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
  .ai-pill svg{width:10px;height:10px;color:var(--accent)}
  .it-time{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-left:auto}
  .it-title{font-size:15.5px;font-weight:500;color:var(--ink);line-height:1.32;margin-bottom:3px}
  .it-desc{font-size:12.5px;color:var(--ink-2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .it-link{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--ink-2);display:inline-flex;align-items:center;gap:5px;align-self:flex-start;text-decoration:none}
  .it-link svg{width:12px;height:12px}

  .empty{padding:40px 0;text-align:center;color:var(--ink-3);font-size:13px}

  .foot{margin-top:30px;padding-top:18px;border-top:1px dashed var(--line);font-family:var(--mono);font-size:10.5px;color:var(--ink-3);line-height:1.7}
  .foot b{color:var(--ink-2)}

  .thumb.t0{background:linear-gradient(135deg,#1d2b3a,#33536b)}
  .thumb.t1{background:linear-gradient(135deg,#2a2440,#5a4a7a)}
  .thumb.t2{background:linear-gradient(135deg,#143a32,#2f6f5e)}
  .thumb.t3{background:linear-gradient(135deg,#3a2418,#7a5230)}
  .sq.s0{background:linear-gradient(135deg,#155e52,#2f6f5e)}
  .sq.s1{background:linear-gradient(135deg,#1d2b3a,#33536b)}
  .sq.s2{background:linear-gradient(135deg,#3a2418,#7a5230)}

  @media(max-width:760px){
    .sidebar{display:none}
    .tile.feature{grid-column:span 1;min-height:150px}
    .content{padding:22px 18px 60px}
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-row"><span class="brand-cn">源镜</span><span class="brand-en">SourceLens</span></div>
      <div class="brand-tag">Follow sources, not feeds.</div>
    </div>
    <div class="today-line"><span><span class="dot"></span>84 sources</span><span>23 有更新</span></div>
    <div class="nav" id="nav"></div>
    <button class="new-btn">＋ 新建 room / 分区</button>
  </aside>

  <main class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="content"></div>
  </main>

<script>
/* ---------- icons ---------- */
const I = {
  x:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
  youtube:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
  rss:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.429 5.143v2.857c6.314 0 11.428 5.114 11.428 11.428h2.857c0-7.89-6.395-14.285-14.285-14.285zM3.429 10.857v2.857A5.714 5.714 0 0 1 9.143 19.43H12c0-4.732-3.839-8.572-8.571-8.572zM6.286 16.571a2.857 2.857 0 1 1-5.715 0 2.857 2.857 0 0 1 5.715 0z"/></svg>',
  arxiv:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></svg>',
  mic:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  arr:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"/></svg>'
};
const platIcon = p => I[p] || I.rss;
const platName = {x:'X',youtube:'YouTube',rss:'Blog',arxiv:'arXiv',mic:'Podcast'};

/* ---------- sample data ---------- */
/* a Room = one entity, bound to several platform feeds; items merge by time */
const rooms = {
  elon:{name:'Elon Musk',type:'人物',imp:5,bindings:['x','youtube','rss'],items:[
    {kind:'x',title:null,aiTitle:'关于 Starship 下次试飞窗口的简短更新',desc:'示例推文 · 原文无标题，由 AI 拟题',time:'2 小时前',day:0},
    {kind:'youtube',title:'示例：发射任务全程回放',desc:'频道更新 · 含发射与回收画面',dur:'42:18',time:'今天 09:10',day:0,thumb:0},
    {kind:'x',title:null,aiTitle:'转发了一条关于能源存储的图表',desc:'示例推文 · 引用转发',time:'昨天 23:40',day:1},
    {kind:'rss',title:'示例博客：年度技术路线说明',desc:'个人站点更新 · 长文',time:'昨天 18:02',day:1},
    {kind:'youtube',title:'示例：工厂参观短片',desc:'频道更新',dur:'08:55',time:'3 天前',day:2,thumb:3},
  ]},
  anthropic:{name:'Anthropic',type:'公司',imp:5,bindings:['rss','x'],items:[
    {kind:'rss',title:'示例：新模型发布说明',desc:'官方博客 · 产品公告',time:'1 小时前',day:0},
    {kind:'x',title:'示例推文：研究方向更新',desc:'官方账号',time:'今天 11:20',day:0},
    {kind:'rss',title:'示例：可解释性研究新进展',desc:'研究博客',time:'昨天 15:30',day:1},
  ]},
  dario:{name:'Dario Amodei',type:'人物',imp:4,bindings:['x','rss'],items:[
    {kind:'x',title:null,aiTitle:'对一篇行业报告的简短评论',desc:'示例推文 · AI 拟题',time:'今天 08:00',day:0},
    {kind:'rss',title:'示例长文：关于扩展规律的思考',desc:'个人随笔',time:'4 天前',day:2},
  ]},
  aresearch:{name:'Anthropic Research',type:'子集',imp:3,bindings:['arxiv','rss'],items:[
    {kind:'arxiv',title:'示例论文：一种新的对齐方法',desc:'arXiv cs.AI · 预印本',time:'今天 06:30',day:0},
    {kind:'arxiv',title:'示例论文：长上下文评测基准',desc:'arXiv cs.CL',time:'2 天前',day:2},
  ]},
  openai:{name:'OpenAI',type:'公司',imp:4,bindings:['rss','x'],items:[
    {kind:'rss',title:'示例：产品更新日志',desc:'官方博客',time:'5 小时前',day:0},
    {kind:'x',title:'示例推文：开发者公告',desc:'官方账号',time:'昨天 20:15',day:1},
  ]},
  xai:{name:'xAI',type:'公司',imp:3,bindings:['x','rss'],items:[
    {kind:'x',title:null,aiTitle:'发布了一段产品演示',desc:'示例推文 · AI 拟题',time:'今天 10:40',day:0},
  ]},
  lecun:{name:'Yann LeCun',type:'人物',imp:4,bindings:['x','arxiv'],items:[
    {kind:'x',title:null,aiTitle:'关于世界模型的一段长推文',desc:'示例推文 · AI 拟题',time:'今天 07:45',day:0},
    {kind:'arxiv',title:'示例论文：自监督表征学习',desc:'arXiv · 合作者',time:'昨天 14:00',day:1},
  ]},
  karpathy:{name:'Andrej Karpathy',type:'人物',imp:3,bindings:['x','youtube'],items:[
    {kind:'youtube',title:'示例：从零实现一个小型模型',desc:'教学视频更新',dur:'1:58:30',time:'今天 12:00',day:0,thumb:1},
    {kind:'x',title:null,aiTitle:'分享了一份学习路线笔记',desc:'示例推文 · AI 拟题',time:'昨天 09:30',day:1},
  ]},
  llmpod:{name:'某 AI 播客',type:'节目',imp:2,bindings:['mic','rss'],items:[
    {kind:'mic',title:'示例：第 112 期 · 与一位研究员对谈',desc:'播客更新',dur:'1:12:40',time:'昨天 21:00',day:1},
  ]},
};

/* nav structure: sections (folders) -> rooms; a room can also have child rooms */
const nav = [
  {pinned:true, room:'elon'},
  {section:'AI 实验室', rooms:[
    {room:'anthropic', children:['dario','aresearch']},
    {room:'openai'},
    {room:'xai'},
  ]},
  {section:'科学家观察', rooms:[
    {room:'lecun'},
    {room:'karpathy'},
  ]},
  {section:'开源 · 论文 · 节目', rooms:[
    {room:'llmpod'},
  ]},
];

let current = 'home';

/* ---------- helpers ---------- */
function impDots(n,cls){let s='';for(let i=0;i<5;i++)s+=`<i class="${i<n?'on':''}"></i>`;return `<span class="${cls}">${s}</span>`;}
function updCount(r){return rooms[r].items.filter(i=>i.day===0).length;}
function latest(r){return rooms[r].items.slice(0,2);}
function sortedRooms(){return Object.keys(rooms).sort((a,b)=>rooms[b].imp-rooms[a].imp);}

/* ---------- sidebar ---------- */
function renderNav(){
  const el=document.getElementById('nav');
  let h=`<button class="home-btn ${current==='home'?'active':''}" onclick="go('home')">${I.home}今日总览</button>`;
  nav.forEach((blk,bi)=>{
    if(blk.pinned){
      const r=blk.room;
      h+=`<button class="room-link ${current===r?'active':''}" onclick="go('${r}')">★ ${rooms[r].name}${impDots(rooms[r].imp,'imp')}<span class="upd">${updCount(r)}</span></button>`;
      return;
    }
    const total=blk.rooms.reduce((s,x)=>s+1+(x.children?x.children.length:0),0);
    h+=`<div class="section" id="sec-${bi}">
      <div class="section-head" onclick="toggleSec(${bi})">
        ${I.chev.replace('<svg','<svg class="chev"')}<span class="label">${blk.section}</span><span class="count">${total}</span>
      </div><div class="section-body">`;
    blk.rooms.forEach((x,xi)=>{
      const r=x.room;
      if(x.children){
        h+=`<div class="child-wrap" id="cw-${bi}-${xi}">
          <button class="room-link child-toggle ${current===r?'active':''}">
            <span onclick="event.stopPropagation();toggleChild(${bi},${xi})">${I.chev.replace('<svg','<svg class="chev2"')}</span>
            <span onclick="go('${r}')" style="flex:1">${rooms[r].name}</span>
            ${impDots(rooms[r].imp,'imp')}<span class="upd">${updCount(r)}</span>
          </button>
          <div class="child-rooms sub">`;
        x.children.forEach(c=>{
          h+=`<button class="room-link ${current===c?'active':''}" onclick="go('${c}')"><span class="platdot"></span>${rooms[c].name}<span class="upd">${updCount(c)}</span></button>`;
        });
        h+=`</div></div>`;
      }else{
        h+=`<button class="room-link ${current===r?'active':''}" onclick="go('${r}')">${rooms[r].name}${impDots(rooms[r].imp,'imp')}<span class="upd">${updCount(r)}</span></button>`;
      }
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}
function toggleSec(i){document.getElementById('sec-'+i).classList.toggle('collapsed');}
function toggleChild(b,x){document.getElementById(`cw-${b}-${x}`).classList.toggle('collapsed');}

/* ---------- topbar ---------- */
function renderTop(){
  const t=document.getElementById('topbar');
  if(current==='home'){
    t.innerHTML=`<div class="crumb">源镜 / 今日总览</div><div class="spacer"></div>
      <div class="seg"><button class="on">重要性</button><button>最近更新</button></div>`;
  }else{
    const r=rooms[current];
    t.innerHTML=`<div class="crumb"><span class="back" onclick="go('home')">← 首页</span> ROOM / ${r.name}</div>
      <div class="spacer"></div>
      <div class="seg" id="tlseg"><button class="on" onclick="setView(0)">今日轨迹</button><button onclick="setView(1)">回溯 ↺</button></div>`;
  }
}

/* ---------- home ---------- */
function renderHome(){
  const order=sortedRooms();
  let cards='';
  order.forEach((r,idx)=>{
    const rm=rooms[r];
    const feat=idx===0;
    const peeks=latest(r).map(it=>`
      <div class="peek-item">
        <span class="pi-ic">${platIcon(it.kind)}</span>
        <span class="pi-t">${it.title||it.aiTitle}</span>
        <span class="pi-time">${it.time}</span>
      </div>`).join('');
    cards+=`<div class="tile ${feat?'feature':''}" onclick="go('${r}')">
      <span class="enter-hint">${I.arr}</span>
      <div class="tile-top">
        <span class="tile-name">${rm.name}</span>
      </div>
      <div class="tile-meta">
        <span class="plats">${rm.bindings.map(platIcon).join('')}</span>
        <span class="tile-type">${rm.type}</span>
        ${impDots(rm.imp,'imp-row')}
      </div>
      <div class="tile-upd">● 今日 ${updCount(r)} 条更新</div>
      <div class="peek">${feat?peeks:peeks.split('</div>').slice(0,2).join('</div>')+'</div>'}</div>
    </div>`;
  });
  document.getElementById('content').innerHTML=`
    <div class="h-head"><h1 class="h-title">今日总览</h1><span class="h-sub">按重要性排序 · 顺序由你掌控</span></div>
    <p class="h-note">每个方块是一个 <b>room</b>（一个你关注的对象）。大小与位置由你给它设的重要度决定，<b>不是算法推断</b>。点任意方块进入它的全平台时间线，或从左侧自定义分区进入。</p>
    <div class="grid">${cards}</div>
    <div class="foot">
      <b>这是 v0 界面原型 · 可点击 · 数据为示例</b><br>
      数据模型：一个 ROOM = 一组源绑定（X / YouTube / Blog / arXiv …），每条抓回的内容统一成带时间戳的对象，room 时间线 = 按时间归并排序。<br>
      AI 在 v0 仅出现一处：推文无标题时自动拟题（卡片上的 <span style="color:var(--accent)">✦ AI 拟题</span> 标记）。其余智能为后续可选副驾。
    </div>`;
}

/* ---------- room view ---------- */
let viewMode=0; // 0 = today+recent, 1 = older (回溯)
function setView(m){viewMode=m;renderTop();
  document.querySelectorAll('#tlseg button').forEach((b,i)=>b.classList.toggle('on',i===m));
  renderRoom(current,true);}

function thumbClass(n){return 't'+((n||0)%4);}
function sqClass(kind){return kind==='arxiv'?'s0':(kind==='mic'?'s2':'s1');}

function itemCard(it){
  let media,meta,extra='',link;
  const ico=`<span class="src">${platIcon(it.kind)} ${platName[it.kind]}</span>`;
  if(it.kind==='youtube'){
    media=`<div class="thumb ${thumbClass(it.thumb)}"><div class="play">${I.play}</div><div class="dur">${it.dur}</div></div>`;
    link='在 YouTube 打开';
  }else if(it.kind==='mic'){
    media=`<div class="sq ${sqClass(it.kind)}">${I.mic}<span class="dur" style="position:absolute"></span></div>`;
    media=`<div class="sq ${sqClass(it.kind)}">${I.mic}</div>`;
    link='收听';
  }else if(it.kind==='arxiv'){
    media=`<div class="sq ${sqClass(it.kind)}">${I.arxiv}</div>`;
    link='查看预印本';
  }else if(it.kind==='rss'){
    media=`<div class="sq ${sqClass('rss')}">${I.rss}</div>`;
    link='阅读原文';
  }else{ // x
    media=`<div class="sq s1">${I.x}</div>`;
    link='在 X 查看';
  }
  if(it.kind==='x' && !it.title){
    extra=`<span class="ai-pill">${I.spark} AI 拟题</span>`;
  }
  const title=it.title||it.aiTitle;
  const dur=(it.kind==='mic')?`<span class="src">${I.mic} ${it.dur}</span>`:'';
  return `<div class="item">
    ${media}
    <div class="it-body">
      <div class="it-meta">${ico}${dur}${extra}<span class="it-time">${it.time}</span></div>
      <div class="it-title">${title}</div>
      <div class="it-desc">${it.desc}</div>
      <a class="it-link" href="#" onclick="return false">${link} ${I.arr}</a>
    </div>
  </div>`;
}

function renderRoom(r,keep){
  current=r;
  if(!keep){renderTop();renderNav();}
  const rm=rooms[r];
  const dayName=['今天','昨天','更早'];
  const groups={};
  rm.items.forEach(it=>{(groups[it.day]=groups[it.day]||[]).push(it);});

  // 回溯 view shows day>=2; today view shows day 0 & 1
  const visibleDays=Object.keys(groups).map(Number).sort((a,b)=>a-b)
    .filter(d => viewMode===0 ? d<=1 : d>=2);

  let tl='';
  if(visibleDays.length===0){
    tl=`<div class="empty">${viewMode===1?'更早的轨迹这里为空（示例数据）。回溯模式下可一直向过去翻阅这个对象的发布历史。':'今日与昨日暂无更新。'}</div>`;
  }else{
    visibleDays.forEach(d=>{
      tl+=`<div class="day-div"><span class="day-label">${dayName[d]||(d+' 天前')}</span><span class="ln"></span></div>`;
      tl+=groups[d].map(itemCard).join('');
    });
  }

  document.getElementById('content').innerHTML=`
    <div class="room-hero">
      <div class="rh-left">
        <div class="rh-name">${rm.name}</div>
        <div class="rh-sub">
          <span class="rh-type">${rm.type}</span>
          <span class="bindings">${rm.bindings.map(b=>`<span class="binding">${platIcon(b)} ${platName[b]}</span>`).join('')}</span>
        </div>
      </div>
      <div class="rh-right">
        <div class="imp-ctl">重要度
          <span class="squares" id="impctl">${[1,2,3,4,5].map(n=>`<i class="${n<=rm.imp?'on':''}" onclick="setImp('${r}',${n})"></i>`).join('')}</span>
        </div>
        <div class="rh-hint">这个 room 把该对象在 ${rm.bindings.map(b=>platName[b]).join(' / ')} 上的发布，按时间穿成一条轨迹。子 room 各自独立收集，不汇入此处。</div>
      </div>
    </div>
    <div class="timeline">${tl}</div>
    <div class="foot"><b>启动器卡片</b>：只给标题 / 封面 / 时长 / 简介 + 原文链接，点出去看原文 —— 源镜负责索引与编排，不替你读完内容。</div>`;
}

function setImp(r,n){rooms[r].imp=n;renderRoom(r,true);renderNav();}

/* ---------- router ---------- */
function go(target){
  viewMode=0;
  current=target;
  renderNav();renderTop();
  if(target==='home')renderHome(); else renderRoom(target);
  document.querySelector('.main').scrollTop=0;
  window.scrollTo(0,0);
}

renderNav();renderTop();renderHome();
</script>
</body>
</html>
